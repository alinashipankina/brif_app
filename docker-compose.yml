version: '3.8'

services:
  db:
    image: mysql:9.5.0
    environment:
      - MYSQL_ROOT_PASSWORD=Passw0rd2
    ports:
      - '3307:3306'
    restart: always

  ml-service:
    build: ./ml
    ports:
      - "5001:5000"
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

