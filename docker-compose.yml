version: '3.8'

services:
  db:
    image: mysql:9.5.0
    environment:
      - MYSQL_ROOT_PASSWORD=Passw0rd2
      - MYSQL_DATABASE=brif
    ports:
      - '3307:3306'
    restart: always
    volumes:
      - mysql_data:/var/lib/mysql
    labels:
      - docker-volume-backup.stop-during-backup=true

  ml-service:
    build: ./ml
    ports:
      - "5001:5000"
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ml_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  
  backup:
    image: offen/docker-volume-backup:v2
    restart: always
    environment:
      - BACKUP_CRON_EXPRESSION=0 2 * * *
      - BACKUP_FILENAME=backup-%Y-%m-%dT%H-%M-%S.tar.gz
      - BACKUP_RETENTION_DAYS=7
      - BACKUP_SOURCES=/backup
      - BACKUP_LOGGING=debug
    volumes:
      - mysql_data:/backup/mysql_data:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - type: bind
        source: ./backups
        target: /archive
      - ml_data:/backup/ml_data:ro
    depends_on:
      - db

volumes:
  mysql_data:
  ml_data:
